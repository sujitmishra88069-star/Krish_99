<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JARVIS AI Voice Assistant</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        :root { --primary: #00d4ff; --secondary: #0099cc; --accent: #ff6b35; --bg-dark: #0a0e1a; --glass: rgba(0, 212, 255, 0.1); --glass-border: rgba(0, 212, 255, 0.3); }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg-dark); color: #fff; overflow: hidden; position: fixed; width: 100%; height: 100%; touch-action: none; }
        
        /* --- SECURITY LOGIN SCREEN CSS --- */
        #securityScreen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #0a0e1a; z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 0.5s ease;
        }
        .login-box {
            background: rgba(0, 212, 255, 0.05); border: 1px solid var(--primary);
            padding: 40px; border-radius: 15px; text-align: center;
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.2); width: 90%; max-width: 400px;
        }
        .login-title {
            color: var(--primary); font-size: 1.5rem; letter-spacing: 4px;
            margin-bottom: 20px; text-transform: uppercase; text-shadow: 0 0 10px var(--primary);
        }
        #passInput {
            background: transparent; border: none; border-bottom: 2px solid var(--primary);
            color: white; font-size: 1.2rem; padding: 10px; text-align: center;
            outline: none; letter-spacing: 2px; margin-bottom: 20px; width: 100%;
        }
        #passInput::placeholder { color: rgba(255,255,255,0.3); }
        .login-btn {
            background: rgba(0, 212, 255, 0.2); color: var(--primary);
            border: 1px solid var(--primary); padding: 10px 30px; font-size: 1rem;
            cursor: pointer; letter-spacing: 2px; border-radius: 5px; transition: all 0.3s;
            text-transform: uppercase; font-weight: bold; width: 100%;
        }
        .login-btn:hover, .login-btn:active { background: var(--primary); color: #000; box-shadow: 0 0 15px var(--primary); }
        .access-denied { color: #ff0000; margin-top: 15px; font-size: 0.9rem; opacity: 0; transition: opacity 0.3s; text-shadow: 0 0 5px red; }

        /* --- BACKGROUND & MAIN UI CSS --- */
        .bg-grid { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-image: linear-gradient(rgba(0, 212, 255, 0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(0, 212, 255, 0.03) 1px, transparent 1px); background-size: 50px 50px; animation: gridMove 20s linear infinite; pointer-events: none; }
        @keyframes gridMove { 0% { transform: perspective(500px) rotateX(60deg) translateY(0); } 100% { transform: perspective(500px) rotateX(60deg) translateY(50px); } }
        
        .particles { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; overflow: hidden; }
        .particle { position: absolute; width: 2px; height: 2px; background: var(--primary); border-radius: 50%; opacity: 0.5; animation: float 10s infinite; }
        @keyframes float { 0%, 100% { transform: translateY(100vh) rotate(0deg); opacity: 0; } 10% { opacity: 0.5; } 90% { opacity: 0.5; } 100% { transform: translateY(-100vh) rotate(720deg); opacity: 0; } }
        
        .container { position: relative; z-index: 10; height: 100vh; display: flex; flex-direction: column; padding: 20px; background: radial-gradient(ellipse at center, transparent 0%, rgba(0,0,0,0.4) 100%); }
        .header { text-align: center; padding: 20px 0; position: relative; }
        .jarvis-logo { font-size: 2rem; font-weight: 300; letter-spacing: 8px; color: var(--primary); text-shadow: 0 0 20px var(--primary); position: relative; display: inline-block; }
        .jarvis-logo::after { content: ''; position: absolute; bottom: -5px; left: 0; width: 100%; height: 2px; background: linear-gradient(90deg, transparent, var(--primary), transparent); animation: scanline 3s linear infinite; }
        @keyframes scanline { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }
        
        .status-bar { display: flex; justify-content: center; gap: 20px; margin-top: 10px; font-size: 0.75rem; color: rgba(255,255,255,0.6); text-transform: uppercase; letter-spacing: 2px; }
        .status-item { display: flex; align-items: center; gap: 5px; }
        .status-dot { width: 6px; height: 6px; border-radius: 50%; background: #333; transition: all 0.3s; }
        .status-dot.active { background: var(--primary); box-shadow: 0 0 10px var(--primary); animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        
        .visualizer-container { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }
        .core-ring { position: relative; width: 280px; height: 280px; display: flex; align-items: center; justify-content: center; }
        .ring { position: absolute; border-radius: 50%; border: 2px solid transparent; transition: all 0.3s ease; }
        .ring-outer { width: 100%; height: 100%; border-top-color: var(--primary); border-right-color: rgba(0, 212, 255, 0.3); animation: rotate 10s linear infinite; }
        .ring-middle { width: 85%; height: 85%; border-bottom-color: var(--primary); border-left-color: rgba(0, 212, 255, 0.3); animation: rotateReverse 8s linear infinite; }
        .ring-inner { width: 70%; height: 70%; border-top-color: var(--secondary); border-bottom-color: rgba(0, 153, 204, 0.3); animation: rotate 6s linear infinite; }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes rotateReverse { from { transform: rotate(360deg); } to { transform: rotate(0deg); } }
        
        .core-button { width: 120px; height: 120px; border-radius: 50%; background: radial-gradient(circle at 30% 30%, rgba(0, 212, 255, 0.8), rgba(0, 100, 150, 0.4)); border: 2px solid var(--primary); box-shadow: 0 0 30px rgba(0, 212, 255, 0.5), inset 0 0 30px rgba(0, 212, 255, 0.2); display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.3s ease; position: relative; z-index: 20; }
        .core-button:active { transform: scale(0.95); }
        .core-button.listening { animation: listeningPulse 1.5s ease-in-out infinite; background: radial-gradient(circle at 30% 30%, rgba(255, 107, 53, 0.8), rgba(200, 50, 0, 0.4)); border-color: var(--accent); box-shadow: 0 0 50px rgba(255, 107, 53, 0.6), inset 0 0 30px rgba(255, 107, 53, 0.3); }
        @keyframes listeningPulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
        
        .mic-icon { width: 40px; height: 40px; fill: white; filter: drop-shadow(0 0 5px rgba(255,255,255,0.5)); }
        
        .command-display { margin-top: 30px; text-align: center; min-height: 80px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .transcript { font-size: 1.2rem; color: rgba(255,255,255,0.9); max-width: 90%; word-wrap: break-word; opacity: 0; transform: translateY(10px); transition: all 0.3s ease; }
        .transcript.show { opacity: 1; transform: translateY(0); }
        .transcript.processing { color: var(--primary); font-style: italic; }
        
        .response { margin-top: 10px; font-size: 1rem; color: var(--primary); text-shadow: 0 0 10px rgba(0, 212, 255, 0.5); opacity: 0; transform: translateY(10px); transition: all 0.3s ease; }
        .response.show { opacity: 1; transform: translateY(0); }
        
        .controls-panel { background: var(--glass); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); border: 1px solid var(--glass-border); border-radius: 20px; padding: 20px; margin-bottom: 20px; z-index: 20; position: relative;}
        .quick-commands { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .cmd-btn { background: rgba(0, 212, 255, 0.1); border: 1px solid rgba(0, 212, 255, 0.3); border-radius: 12px; padding: 12px 8px; color: white; font-size: 0.75rem; text-align: center; cursor: pointer; transition: all 0.3s; text-transform: uppercase; letter-spacing: 1px; }
        .cmd-btn:hover, .cmd-btn:active { background: rgba(0, 212, 255, 0.3); transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0, 212, 255, 0.3); }
        
        .voice-bars { display: flex; align-items: center; justify-content: center; gap: 3px; height: 40px; margin-top: 20px; opacity: 0; transition: opacity 0.3s; }
        .voice-bars.active { opacity: 1; }
        .bar { width: 4px; background: var(--primary); border-radius: 2px; transition: height 0.1s ease; box-shadow: 0 0 5px var(--primary); }
        
        .info-panel { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0); background: rgba(10, 14, 26, 0.95); border: 1px solid var(--primary); border-radius: 20px; padding: 30px; max-width: 90%; width: 350px; z-index: 1000; opacity: 0; transition: all 0.3s ease; box-shadow: 0 0 50px rgba(0, 212, 255, 0.3); }
        .info-panel.show { transform: translate(-50%, -50%) scale(1); opacity: 1; }
        .info-title { color: var(--primary); font-size: 1.2rem; margin-bottom: 15px; text-align: center; text-transform: uppercase; letter-spacing: 3px; }
        .info-content { color: rgba(255,255,255,0.8); font-size: 0.9rem; line-height: 1.6; }
        .close-btn { position: absolute; top: 10px; right: 10px; background: none; border: none; color: var(--primary); font-size: 1.5rem; cursor: pointer; width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; }
        
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 999; opacity: 0; pointer-events: none; transition: opacity 0.3s; }
        .overlay.show { opacity: 1; pointer-events: all; }
        
        .corner { position: fixed; width: 50px; height: 50px; border: 2px solid var(--primary); opacity: 0.5; }
        .corner-tl { top: 20px; left: 20px; border-right: 0; border-bottom: 0; }
        .corner-tr { top: 20px; right: 20px; border-left: 0; border-bottom: 0; }
        .corner-bl { bottom: 20px; left: 20px; border-right: 0; border-top: 0; }
        .corner-br { bottom: 20px; right: 20px; border-left: 0; border-top: 0; }
        
        .loading-ring { position: absolute; width: 100%; height: 100%; border-radius: 50%; border: 3px solid transparent; border-top-color: var(--accent); animation: spin 1s linear infinite; opacity: 0; }
        .loading-ring.show { opacity: 1; }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        @media (max-height: 700px) { .core-ring { width: 220px; height: 220px; } .core-button { width: 90px; height: 90px; } .mic-icon { width: 30px; height: 30px; } .jarvis-logo { font-size: 1.5rem; } }

        /* API Key Input Styling */
        .api-input-container { margin-top: 15px; display: flex; flex-direction: column; gap: 10px; }
        .api-input { padding: 10px; border-radius: 8px; border: 1px solid var(--primary); background: rgba(0,0,0,0.5); color: white; outline: none; }
        .api-btn { padding: 10px; background: var(--primary); color: black; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <!-- SECURITY LOGIN SCREEN -->
    <div id="securityScreen">
        <div class="login-box">
            <div class="login-title">Restricted Access</div>
            <p style="color: gray; font-size: 0.8rem; margin-bottom: 20px;">Enter Override Code</p>
            <input type="password" id="passInput" placeholder="PASSWORD">
            <button class="login-btn" onclick="checkPassword()">Verify</button>
            <div class="access-denied" id="errorMsg">ACCESS DENIED!</div>
        </div>
    </div>

    <!-- MAIN JARVIS UI -->
    <div class="bg-grid"></div>
    <div class="particles" id="particles"></div>

    <div class="corner corner-tl"></div>
    <div class="corner corner-tr"></div>
    <div class="corner corner-bl"></div>
    <div class="corner corner-br"></div>

    <div class="container">
        <div class="header">
            <h1 class="jarvis-logo">J.A.R.V.I.S.</h1>
            <div class="status-bar">
                <div class="status-item"><div class="status-dot" id="systemStatus"></div><span>System</span></div>
                <div class="status-item"><div class="status-dot" id="voiceStatus"></div><span>Voice</span></div>
                <div class="status-item"><div class="status-dot" id="aiStatus"></div><span>AI Link</span></div>
                <div class="status-item"><span id="clock">00:00</span></div>
            </div>
        </div>

        <div class="visualizer-container">
            <div class="core-ring">
                <div class="ring ring-outer"></div>
                <div class="ring ring-middle"></div>
                <div class="ring ring-inner"></div>
                <div class="loading-ring" id="loadingRing"></div>
                
                <button class="core-button" id="coreBtn" onclick="toggleListening()">
                    <svg class="mic-icon" viewBox="0 0 24 24">
                        <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/>
                        <path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
                    </svg>
                </button>
            </div>

            <div class="voice-bars" id="voiceBars"></div>

            <div class="command-display">
                <div class="transcript" id="transcript">System Locked. Waiting for override...</div>
                <div class="response" id="response"></div>
            </div>
        </div>

        <div class="controls-panel">
            <div class="quick-commands">
                <button class="cmd-btn" onclick="simulateCommand('time')">Time</button>
                <button class="cmd-btn" onclick="simulateCommand('weather')">Weather</button>
                <button class="cmd-btn" onclick="simulateCommand('Who is Elon Musk?')">Elon Musk</button>
                <button class="cmd-btn" onclick="simulateCommand('Tell me a short sci-fi story')">Story</button>
                <button class="cmd-btn" onclick="simulateCommand('How to learn coding?')">Coding</button>
                <button class="cmd-btn" onclick="showSettings()">⚙️ AI Settings</button>
            </div>
        </div>
    </div>

    <!-- AI SETTINGS MODAL -->
    <div class="overlay" id="overlay" onclick="closeInfo()"></div>
    <div class="info-panel" id="infoPanel">
        <button class="close-btn" onclick="closeInfo()">×</button>
        <div class="info-title" id="infoTitle">AI Brain Configuration</div>
        <div class="info-content" id="infoContent">
            <p>To make JARVIS answer ANY question, you need a free Google Gemini API Key.</p>
            <div class="api-input-container">
                <input type="text" id="apiKeyInput" class="api-input" placeholder="Paste Gemini API Key here...">
                <button class="api-btn" onclick="saveApiKey()">Save AI Key</button>
            </div>
            <p style="font-size: 0.75rem; margin-top: 15px; color: #aaa;">Get a free key from: <a href="https://aistudio.google.com/app/apikey" target="_blank" style="color: var(--primary);">Google AI Studio</a></p>
        </div>
    </div>

    <script>
        // === 1. SECURITY PASSWORD SYSTEM ===
        const SECRET_PASSWORD = "krish8140"; // <--- YAHAN APNA PASSWORD BADAL SAKTE HAIN

        let synthesis = window.speechSynthesis; // Init speech synthesis early

        function checkPassword() {
            let enteredPass = document.getElementById('passInput').value;
            let errorMsg = document.getElementById('errorMsg');
            let securityScreen = document.getElementById('securityScreen');

            if(enteredPass === SECRET_PASSWORD) {
                // Password Sahi Hai
                securityScreen.style.opacity = "0";
                setTimeout(() => {
                    securityScreen.style.display = "none";
                    document.getElementById('systemStatus').classList.add('active');
                    
                    // Start JARVIS Greeting
                    const welcomeMsg = GEMINI_API_KEY ? 
                        "Security override accepted. JARVIS online and AI link established." : 
                        "Security override accepted. Please configure the AI API key in settings.";
                    
                    showTranscript("Tap the center to speak...");
                    showResponse(welcomeMsg);
                    speak(welcomeMsg);
                    initSpeechRecognition(); // Init Mic after unlock
                }, 500);
            } else {
                // Password Galat Hai
                errorMsg.style.opacity = "1";
                document.getElementById('passInput').value = ""; // Clear input
                speak("Access denied. Incorrect override code."); // Warn intruder
                setTimeout(() => { errorMsg.style.opacity = "0"; }, 2000);
            }
        }

        // Allow pressing 'Enter' on keyboard to login
        document.getElementById("passInput").addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                event.preventDefault();
                checkPassword();
            }
        });


        // === 2. ANIMATIONS & BASIC SETUP ===
        function createParticles() {
            const container = document.getElementById('particles');
            for (let i = 0; i < 20; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 10 + 's';
                particle.style.animationDuration = (10 + Math.random() * 10) + 's';
                container.appendChild(particle);
            }
        }
        createParticles();

        function updateClock() {
            const now = new Date();
            document.getElementById('clock').textContent = `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;
        }
        setInterval(updateClock, 1000); updateClock();

        const voiceBars = document.getElementById('voiceBars');
        for (let i = 0; i < 20; i++) {
            const bar = document.createElement('div'); bar.className = 'bar'; bar.style.height = '5px'; voiceBars.appendChild(bar);
        }

        function animateVoiceBars(active) {
            const bars = document.querySelectorAll('.bar');
            if (active) {
                voiceBars.classList.add('active');
                bars.forEach((bar, i) => {
                    bar.style.animation = `none`;
                    setTimeout(() => {
                        bar.style.animation = `barJump 0.5s ease-in-out infinite alternate`;
                        bar.style.animationDelay = (i * 0.05) + 's';
                    }, 10);
                });
                if (!document.getElementById('barAnim')) {
                    const style = document.createElement('style'); style.id = 'barAnim';
                    style.textContent = `@keyframes barJump { from { height: 5px; } to { height: ${Math.random() * 30 + 10}px; } }`;
                    document.head.appendChild(style);
                }
            } else {
                voiceBars.classList.remove('active');
                bars.forEach(bar => { bar.style.height = '5px'; bar.style.animation = 'none'; });
            }
        }

        // === 3. AI BRAIN & API LOGIC ===
        let GEMINI_API_KEY =('AIzaSyD9ZECtqPjK5qJ3Lyn86P_IMXNcruzxMqc') || '';
        
        if(GEMINI_API_KEY) {
            document.getElementById('aiStatus').classList.add('active');
        }

        function showSettings() {
            document.getElementById('apiKeyInput').value = GEMINI_API_KEY;
            document.getElementById('overlay').classList.add('show');
            document.getElementById('infoPanel').classList.add('show');
        }

        function closeInfo() {
            document.getElementById('overlay').classList.remove('show');
            document.getElementById('infoPanel').classList.remove('show');
        }

        function saveApiKey() {
            const key = document.getElementById('apiKeyInput').value.trim();
            if(key) {
                localStorage.setItem('jarvis_api_key', key);
                GEMINI_API_KEY = key;
                document.getElementById('aiStatus').classList.add('active');
                closeInfo();
                speak("AI brain connected successfully sir.");
                showResponse("AI Connected.");
            }
        }

        async function fetchAIResponse(userMessage) {
            if(!GEMINI_API_KEY) {
                showSettings();
                return "Sir, please configure my AI API key first so I can access the global network.";
            }

            const prompt = `You are J.A.R.V.I.S, Tony Stark's highly advanced AI assistant. You are polite, highly intelligent, and speak gracefully. Provide short, concise answers (maximum 2-3 sentences) because your response will be spoken out loud via text-to-speech. Answer this: ${userMessage}`;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: prompt }] }]
                    })
                });

                const data = await response.json();
                if(data.error) throw new Error(data.error.message);
                
                let cleanText = data.candidates[0].content.parts[0].text.replace(/\*/g, ''); 
                return cleanText;
            } catch (error) {
                console.error("AI Error:", error);
                return "I apologize sir, but I am unable to reach the main servers at this moment. Please check the network or the API key.";
            }
        }

        // === 4. SPEECH RECOGNITION (STT) ===
        let recognition = null;
        let isListening = false;

        function initSpeechRecognition() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) { showResponse("Browser not supported. Use Chrome."); return false; }

            recognition = new SpeechRecognition();
            recognition.continuous = false;
            recognition.interimResults = true;
            recognition.lang = 'en-US';

            recognition.onstart = () => {
                isListening = true;
                document.getElementById('coreBtn').classList.add('listening');
                document.getElementById('voiceStatus').classList.add('active');
                animateVoiceBars(true);
                showTranscript("Listening...", true);
                synthesis.cancel(); // Stop talking if user interrupts
            };

            recognition.onend = () => {
                isListening = false;
                document.getElementById('coreBtn').classList.remove('listening');
                document.getElementById('voiceStatus').classList.remove('active');
                animateVoiceBars(false);
            };

            recognition.onresult = (event) => {
                let finalTranscript = ''; let interimTranscript = '';
                for (let i = event.resultIndex; i < event.results.length; i++) {
                    if (event.results[i].isFinal) finalTranscript += event.results[i][0].transcript;
                    else interimTranscript += event.results[i][0].transcript;
                }
                if (interimTranscript) showTranscript(interimTranscript, true);
                if (finalTranscript) {
                    showTranscript(finalTranscript);
                    processCommand(finalTranscript);
                }
            };
            return true;
        }

        function toggleListening() {
            if (!recognition) return;
            if (isListening) recognition.stop();
            else recognition.start();
        }

        // === 5. COMMAND PROCESSING (THE REAL BRAIN) ===
        async function processCommand(command) {
            document.getElementById('loadingRing').classList.add('show');
            const lowerCmd = command.toLowerCase();
            let response = '';

            // Fast Local Commands
            if (lowerCmd.includes('time')) {
                response = `The current time is ${new Date().toLocaleTimeString()}`;
            } 
            else if (lowerCmd.includes('date')) {
                response = `Today is ${new Date().toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' })}`;
            }
            // Send to Real AI
            else {
                showTranscript("Thinking...", true);
                response = await fetchAIResponse(command);
            }

            document.getElementById('loadingRing').classList.remove('show');
            showTranscript(command, false); 
            showResponse(response);
            speak(response);
        }

        // === 6. TEXT TO SPEECH (TTS) ===
        function speak(text) {
            if (!synthesis) return;
            synthesis.cancel();

            const utterance = new SpeechSynthesisUtterance(text);
            utterance.rate = 1;
            utterance.pitch = 0.8; 
            utterance.volume = 1;

            const voices = synthesis.getVoices();
            const preferredVoice = voices.find(v => 
                v.name.includes('UK English Male') || 
                v.name.includes('Google UK English Male') || 
                v.name.includes('Daniel')
            ) || voices.find(v => v.name.includes('English'));

            if (preferredVoice) utterance.voice = preferredVoice;

            utterance.onstart = () => { document.querySelector('.core-ring').style.transform = "scale(1.05)"; }
            utterance.onend = () => { document.querySelector('.core-ring').style.transform = "scale(1)"; }

            synthesis.speak(utterance);
        }

        function showTranscript(text, processing = false) {
            const el = document.getElementById('transcript');
            el.textContent = text;
            el.classList.add('show');
            if (processing) el.classList.add('processing');
            else el.classList.remove('processing');
        }

        function showResponse(text) {
            const el = document.getElementById('response');
            el.textContent = text;
            el.classList.add('show');
        }

        function simulateCommand(text) {
            showTranscript(text);
            processCommand(text);
        }

        if (synthesis && speechSynthesis.onvoiceschanged !== undefined) {
            speechSynthesis.onvoiceschanged = () => synthesis.getVoices();
        }

    </script>
</body>
